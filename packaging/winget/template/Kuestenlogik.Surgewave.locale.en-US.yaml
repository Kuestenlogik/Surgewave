ShortDescription: The .NET-native message streaming platform — Kafka-wire-compatible broker, Control UI, CLI. Drop-in replacement for Apache Kafka with AI pipelines, schemas, and a plugin marketplace.
Description: |-
  Surgewave is the .NET-native message streaming platform.
  Wire-compatible with Apache Kafka 4.0 — any existing Kafka client
  (Confluent.Kafka, librdkafka, kafka-go, ...) connects on day one.

  This installer registers the Surgewave Broker as a Windows service,
  installs the Control UI (web dashboard on http://localhost:5050),
  and adds the `surgewave` CLI to the system PATH.

  Pure .NET 10 — no JVM, no ZooKeeper, single technology stack.
  Run embedded inside your .NET app, as a standalone broker, or
  scaled out across a cluster.

  Premium extensions ship in separate repositories under the
  Business Source License 1.1.
