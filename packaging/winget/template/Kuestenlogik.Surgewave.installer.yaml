# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.10.0.schema.json
#
# Installer manifest — points winget at the win-x64 MSI on the GitHub
# release.
#
# WiX v5 generates a fresh ProductCode for every build; the renderer
# in .github/workflows/winget.yml extracts the ProductCode straight
# out of the downloaded MSI via the WindowsInstaller COM database
# before substitution. UpgradeCode is the fixed product identity
# declared in deployments/installer/Kuestenlogik.Surgewave.Installer/
# Package.wxs and never changes.
#
# Placeholders substituted at release time:
#   __VERSION__              — release tag minus the leading 'v'
#   __SHA256_X64__           — Get-FileHash of surgewave-<v>-win-x64.msi
#   __PRODUCT_CODE_X64__     — extracted from surgewave-<v>-win-x64.msi
#   __RELEASE_DATE__         — workflow run date (yyyy-MM-dd)
PackageIdentifier: Kuestenlogik.Surgewave
PackageVersion: __VERSION__
InstallerType: wix
Scope: machine
InstallModes:
  - interactive
  - silent
  - silentWithProgress
UpgradeBehavior: install
ReleaseDate: __RELEASE_DATE__
Commands:
  - surgewave
Installers:
  # ProductCode + UpgradeCode are GUIDs in the form {XXXX-XXXX-…},
  # which YAML parses as a flow mapping (the curly braces start a
  # collection!) unless we single-quote the value.
  - Architecture: x64
    InstallerUrl: https://github.com/Kuestenlogik/Surgewave/releases/download/v__VERSION__/surgewave-__VERSION__-win-x64.msi
    InstallerSha256: __SHA256_X64__
    ProductCode: '__PRODUCT_CODE_X64__'
    AppsAndFeaturesEntries:
      - DisplayName: Surgewave Broker
        Publisher: Kuestenlogik
        ProductCode: '__PRODUCT_CODE_X64__'
        UpgradeCode: '{7A3C9E1F-4B2D-4F8A-9C6E-1D5A3B7F2E4C}'
        InstallerType: wix
ManifestType: installer
ManifestVersion: 1.10.0
