<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!--
  Open Graph card source for https://surgewave.io. Rendered to a 1200×630
  PNG by scripts/generate-og-image.js (Playwright). Single source of truth
  for the social-media preview — bump the tagline / bullets here, run the
  script, commit the regenerated site/assets/images/og-image.png.

  Inline CSS only; no external font fetches so the script runs offline.
  Falls back to system sans-serif if the host has no Inter installed.
-->
<style>
  :root {
    --wave: #66cfff;
    --wave-deep: #33bcff;
    --ink: #ffffff;
    --bg-near: #0a4a6e;
    --bg-mid:  #04253a;
    --bg-far:  #011220;
    --text-sub: #cfe9ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 20% 50%, var(--bg-near) 0%, var(--bg-mid) 55%, var(--bg-far) 100%);
  }

  .card {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
  }

  /* Eye-of-the-Surgewave: concentric rings centred on the mark. Same
     colourway as site/assets/images/og-image.svg so HTML- and SVG-rendered
     PNGs match visually. */
  .eye {
    position: absolute;
    left: 220px;
    top: 315px;
    width: 0;
    height: 0;
    transform: translate(-50%, -50%);
  }
  .eye .ring {
    position: absolute;
    left: 50%;
    top: 50%;
    border: 1px solid var(--wave);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  .eye .r240 { width: 480px; height: 480px; opacity: 0.07; }
  .eye .r190 { width: 380px; height: 380px; opacity: 0.12; }
  .eye .r140 { width: 280px; height: 280px; opacity: 0.18; }
  .eye .r95  { width: 190px; height: 190px; opacity: 0.28; border-width: 1.5px; }
  .eye .r60  { width: 120px; height: 120px; opacity: 0.45; border-width: 1.5px; }
  .eye .core {
    width: 76px; height: 76px;
    border: 2px solid var(--wave);
    opacity: 0.7;
    background: radial-gradient(circle, rgba(102, 207, 255, 0.45) 0%, rgba(51, 188, 255, 0.15) 40%, rgba(51, 188, 255, 0) 100%);
  }

  .mark {
    position: absolute;
    left: 175px;
    top: 265px;
    width: 96px;
    height: 96px;
    z-index: 2;
  }
  .mark svg { width: 100%; height: 100%; display: block; }

  .text {
    position: absolute;
    left: 420px;
    top: 130px;
    color: var(--ink);
    z-index: 2;
  }
  .wordmark {
    font-size: 84px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 18px;
  }
  .tagline {
    font-size: 30px;
    font-weight: 600;
    color: var(--wave);
    line-height: 1.2;
    margin-bottom: 24px;
  }
  .bullet {
    font-size: 26px;
    font-weight: 500;
    color: var(--text-sub);
    line-height: 1.4;
    opacity: 0.9;
  }
  .bullet + .bullet { margin-top: 6px; }

  .url {
    position: absolute;
    left: 420px;
    bottom: 90px;
    font-family: 'JetBrains Mono', 'Cascadia Code', Consolas, monospace;
    font-size: 24px;
    color: var(--wave);
    letter-spacing: 2px;
    z-index: 2;
  }

  .badge {
    position: absolute;
    right: 30px;
    bottom: 75px;
    width: 180px;
    height: 36px;
    border: 1.5px solid rgba(102, 207, 255, 0.5);
    border-radius: 4px;
    font-family: 'JetBrains Mono', 'Cascadia Code', Consolas, monospace;
    font-size: 16px;
    color: var(--text-sub);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="card">
    <!-- Concentric rings centred at (220, 315) — matches og-image.svg. -->
    <div class="eye">
      <div class="ring r240"></div>
      <div class="ring r190"></div>
      <div class="ring r140"></div>
      <div class="ring r95"></div>
      <div class="ring r60"></div>
      <div class="ring core"></div>
    </div>

    <!-- Surgewave mark, hero colourway (Wave #66cfff, Ink #ffffff).
         Lifted verbatim from site/assets/images/og-image.svg. -->
    <div class="mark">

        </g>
      </svg>
    </div>

    <div class="text">
      <div class="wordmark">Surgewave</div>
      <div class="tagline">The .NET-native message streaming platform.</div>
      <div class="bullet">No more JVM. Drop-in Kafka replacement.</div>
      <div class="bullet">AI pipelines, schemas, plugin marketplace.</div>
      <div class="bullet">Run embedded, standalone, or clustered.</div>
    </div>

    <div class="url">surgewave.io</div>
    <div class="badge">Apache&nbsp;2.0&nbsp;Core</div>
  </div>
</body>
</html>
