{{- if .Values.control.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "surgewave.fullname" . }}-control
  labels:
    {{- include "surgewave.control.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "surgewave.control.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.control.port }}
      targetPort: http
{{- end }}
