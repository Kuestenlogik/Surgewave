{{- if .Values.security.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "surgewave.fullname" . }}
  labels:
    {{- include "surgewave.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "surgewave.fullname" . }}
  labels:
    {{- include "surgewave.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "surgewave.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "surgewave.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
