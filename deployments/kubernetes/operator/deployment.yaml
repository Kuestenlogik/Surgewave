apiVersion: v1
kind: Namespace
metadata:
  name: surgewave-system
  labels:
    app.kubernetes.io/name: surgewave-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: surgewave-operator
  namespace: surgewave-system
  labels:
    app.kubernetes.io/name: surgewave-operator
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: surgewave-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: surgewave-operator
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: surgewave-operator
      containers:
        - name: operator
          image: surgewave-operator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DOTNET_ENVIRONMENT
              value: Production
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      terminationGracePeriodSeconds: 10
