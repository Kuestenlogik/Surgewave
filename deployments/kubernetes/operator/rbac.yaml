apiVersion: v1
kind: ServiceAccount
metadata:
  name: surgewave-operator
  namespace: surgewave-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: surgewave-operator
rules:
  # SurgewaveCluster CRD
  - apiGroups: ["surgewave.kl.io"]
    resources: ["surgewaveclusters"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["surgewave.kl.io"]
    resources: ["surgewaveclusters/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["surgewave.kl.io"]
    resources: ["surgewaveclusters/finalizers"]
    verbs: ["update"]
  # Core resources
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Apps resources
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # CRD management (for auto-installing CRD)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: surgewave-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: surgewave-operator
subjects:
  - kind: ServiceAccount
    name: surgewave-operator
    namespace: surgewave-system
