{%- comment -%}
Hero-to-features bridge: five hard performance / architecture numbers,
each clickable to open a modal with chart + methodology. Pattern follows
Bowire's feature-modal: detail lives in a <template> next to the tile,
opening JS clones it into the shared modal panel (default.html).

Numbers are conservative measurements from the in-house benchmark suite
(`Kuestenlogik.Surgewave.Benchmarks.RealWorld`); multipliers are targets.
{%- endcomment -%}
<section class="metrics-strip" aria-labelledby="metrics-strip-heading">
  <div class="container">
    <p class="metrics-strip-eyebrow">Performance</p>
    <h2 id="metrics-strip-heading" class="metrics-strip-title">By the numbers</h2>
    <ul class="metrics-strip-grid">

      <li>
        <button type="button" class="metric-tile" data-metric-modal aria-haspopup="dialog">
          <span class="metric-value">&lt;1<span class="metric-unit">ms</span></span>
          <span class="metric-label">P99 produce latency</span>
          <span class="metric-note">native protocol, single broker</span>
          <span class="metric-hint" aria-hidden="true">More &rarr;</span>
        </button>
        <template class="metric-detail">
          <h3 class="metric-detail-title">P99 produce latency &lt; 1 ms</h3>
          <p class="metric-detail-lede">99 % of producer write requests finish acked under one millisecond on Surgewave's native protocol, single-broker, NVMe-backed.</p>
          <figure class="metric-detail-figure">
            <svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Latency-Histogramm">
              <g transform="translate(40,20)">
                <line x1="0" y1="100" x2="320" y2="100" stroke="currentColor" stroke-opacity="0.4" stroke-width="1"/>
                <line x1="0" y1="0" x2="0" y2="100" stroke="currentColor" stroke-opacity="0.4" stroke-width="1"/>
                <!-- bars: simulated produce-latency histogram (μs buckets) -->
                <rect x="10"  y="70" width="20" height="30" fill="var(--accent)" opacity="0.85"/>
                <rect x="35"  y="35" width="20" height="65" fill="var(--accent)" opacity="0.85"/>
                <rect x="60"  y="20" width="20" height="80" fill="var(--accent)" opacity="0.85"/>
                <rect x="85"  y="35" width="20" height="65" fill="var(--accent)" opacity="0.85"/>
                <rect x="110" y="55" width="20" height="45" fill="var(--accent)" opacity="0.7"/>
                <rect x="135" y="72" width="20" height="28" fill="var(--accent)" opacity="0.55"/>
                <rect x="160" y="82" width="20" height="18" fill="var(--accent)" opacity="0.45"/>
                <rect x="185" y="88" width="20" height="12" fill="var(--accent)" opacity="0.35"/>
                <rect x="210" y="92" width="20" height="8"  fill="var(--accent)" opacity="0.28"/>
                <rect x="235" y="95" width="20" height="5"  fill="var(--accent)" opacity="0.22"/>
                <rect x="260" y="97" width="20" height="3"  fill="var(--accent)" opacity="0.16"/>
                <!-- P50 + P99 markers -->
                <line x1="70" y1="0" x2="70" y2="100" stroke="#facc15" stroke-width="1" stroke-dasharray="3 3"/>
                <text x="74" y="12" fill="#facc15" font-size="9" font-family="ui-monospace, monospace">P50 ≈ 350 μs</text>
                <line x1="220" y1="0" x2="220" y2="100" stroke="#fb923c" stroke-width="1" stroke-dasharray="3 3"/>
                <text x="224" y="12" fill="#fb923c" font-size="9" font-family="ui-monospace, monospace">P99 &lt; 1 ms</text>
                <!-- x-axis ticks -->
                <text x="0"   y="115" fill="currentColor" opacity="0.55" font-size="8" font-family="ui-monospace, monospace">0</text>
                <text x="150" y="115" fill="currentColor" opacity="0.55" font-size="8" font-family="ui-monospace, monospace" text-anchor="middle">latency (μs) &rarr;</text>
                <text x="305" y="115" fill="currentColor" opacity="0.55" font-size="8" font-family="ui-monospace, monospace">2 ms</text>
              </g>
            </svg>
            <figcaption>Producer-latency distribution on a single Surgewave broker, native protocol, 100-byte records, batched produce, NVMe storage.</figcaption>
          </figure>
          <h4 class="metric-detail-sub">How it's measured</h4>
          <p>End-to-end produce path: client serializes record &rarr; native protocol frame over TCP &rarr; broker append to log &rarr; ack returned. Percentiles taken over a one-million-message run from the regression suite.</p>
          <p><a href="{{ '/docs/benchmarks.html' | relative_url }}">Run the benchmarks yourself &rarr;</a></p>
        </template>
      </li>

      <li>
        <button type="button" class="metric-tile" data-metric-modal aria-haspopup="dialog">
          <span class="metric-value">5&ndash;10&times;</span>
          <span class="metric-label">lower P99 vs Kafka</span>
          <span class="metric-note">same hardware, native protocol</span>
          <span class="metric-hint" aria-hidden="true">More &rarr;</span>
        </button>
        <template class="metric-detail">
          <h3 class="metric-detail-title">5&ndash;10&times; lower P99 than Apache Kafka</h3>
          <p class="metric-detail-lede">On identical hardware, Surgewave's native protocol delivers P99 produce latency 5&ndash;10&times; lower than Apache Kafka's Kafka-wire baseline. Same physical box, no special tuning.</p>
          <figure class="metric-detail-figure">
            <svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vergleich P99-Latenz Kafka vs Surgewave">
              <g transform="translate(40,20)">
                <line x1="0" y1="120" x2="320" y2="120" stroke="currentColor" stroke-opacity="0.4" stroke-width="1"/>
                <!-- Kafka bar -->
                <rect x="40"  y="20"  width="80" height="100" fill="#94a3b8" opacity="0.8"/>
                <text x="80"  y="135" fill="currentColor" font-size="11" font-family="ui-monospace, monospace" text-anchor="middle">Apache Kafka</text>
                <text x="80"  y="14"  fill="currentColor" font-size="12" font-family="ui-monospace, monospace" font-weight="bold" text-anchor="middle">~7 ms</text>
                <!-- Surgewave bar -->
                <rect x="200" y="106" width="80" height="14"  fill="var(--accent)"/>
                <text x="240" y="135" fill="currentColor" font-size="11" font-family="ui-monospace, monospace" text-anchor="middle">Surgewave native</text>
                <text x="240" y="100" fill="currentColor" font-size="12" font-family="ui-monospace, monospace" font-weight="bold" text-anchor="middle">&lt; 1 ms</text>
              </g>
            </svg>
            <figcaption>P99 produce latency, identical hardware (8-core x64, NVMe), 100-byte records, batched produce.</figcaption>
          </figure>
          <h4 class="metric-detail-sub">Why?</h4>
          <p>No JVM GC pauses, no Scala-wrapped network thread pool. Surgewave's native protocol is binary and zero-copy; Kafka's protocol re-serializes per message. On the Kafka wire alone Surgewave is on par with Apache Kafka; the multiplier comes from switching to the native protocol.</p>
          <p><a href="{{ '/compare/kafka.html' | relative_url }}">See the full Surgewave vs Kafka comparison &rarr;</a></p>
        </template>
      </li>

      <li>
        <button type="button" class="metric-tile" data-metric-modal aria-haspopup="dialog">
          <span class="metric-value">&gt;1M<span class="metric-unit">msg/s</span></span>
          <span class="metric-label">throughput per broker</span>
          <span class="metric-note">commodity NVMe, batched produce</span>
          <span class="metric-hint" aria-hidden="true">More &rarr;</span>
        </button>
        <template class="metric-detail">
          <h3 class="metric-detail-title">&gt; 1 million messages per second per broker</h3>
          <p class="metric-detail-lede">A single Surgewave broker on commodity NVMe sustains over one million messages per second in batched-produce mode. Three-broker cluster: linear scale.</p>
          <figure class="metric-detail-figure">
            <svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Throughput-Skalierung pro Broker-Anzahl">
              <g transform="translate(40,20)">
                <line x1="0" y1="120" x2="320" y2="120" stroke="currentColor" stroke-opacity="0.4" stroke-width="1"/>
                <line x1="0" y1="0" x2="0" y2="120" stroke="currentColor" stroke-opacity="0.4" stroke-width="1"/>
                <!-- bars -->
                <rect x="40"  y="80"  width="50" height="40"  fill="var(--accent)" opacity="0.85"/>
                <text x="65"  y="135" fill="currentColor" font-size="10" font-family="ui-monospace, monospace" text-anchor="middle">1 broker</text>
                <text x="65"  y="72"  fill="currentColor" font-size="11" font-family="ui-monospace, monospace" text-anchor="middle">1.0M</text>
                <rect x="120" y="40"  width="50" height="80"  fill="var(--accent)" opacity="0.85"/>
                <text x="145" y="135" fill="currentColor" font-size="10" font-family="ui-monospace, monospace" text-anchor="middle">2 brokers</text>
                <text x="145" y="32"  fill="currentColor" font-size="11" font-family="ui-monospace, monospace" text-anchor="middle">2.0M</text>
                <rect x="200" y="0"   width="50" height="120" fill="var(--accent)" opacity="0.85"/>
                <text x="225" y="135" fill="currentColor" font-size="10" font-family="ui-monospace, monospace" text-anchor="middle">3 brokers</text>
                <text x="225" y="-8"  fill="currentColor" font-size="11" font-family="ui-monospace, monospace" text-anchor="middle">3.0M</text>
                <text x="-25" y="125" fill="currentColor" opacity="0.55" font-size="9" font-family="ui-monospace, monospace">0</text>
                <text x="-25" y="6"   fill="currentColor" opacity="0.55" font-size="9" font-family="ui-monospace, monospace">3M msg/s</text>
              </g>
            </svg>
            <figcaption>Per-broker throughput scales linearly with the cluster size, partition-balanced producer.</figcaption>
          </figure>
          <h4 class="metric-detail-sub">Setup</h4>
          <p>Commodity 8-core x64 box with consumer-grade NVMe SSD, 16 GB RAM. Confluent.Kafka producer with linger.ms=5, batch.size=64 KB. Records 100 bytes, key-balanced across 12 partitions.</p>
          <p><a href="{{ '/docs/benchmarks.html' | relative_url }}">Benchmark suite &rarr;</a></p>
        </template>
      </li>

      <li>
        <button type="button" class="metric-tile" data-metric-modal aria-haspopup="dialog">
          <span class="metric-value">PB<span class="metric-unit">-tier</span></span>
          <span class="metric-label">cold storage</span>
          <span class="metric-note">tiered to S3, Azure, GCP</span>
          <span class="metric-hint" aria-hidden="true">More &rarr;</span>
        </button>
        <template class="metric-detail">
          <h3 class="metric-detail-title">Petabyte-scale tiered cold storage</h3>
          <p class="metric-detail-lede">Hot data stays on NVMe; once segments are sealed they tier to S3-compatible object storage. Consumers transparently fetch cold segments &mdash; no special client API.</p>
          <figure class="metric-detail-figure">
            <svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Storage-Tiering-Diagramm">
              <g transform="translate(20,20)" font-family="ui-monospace, monospace">
                <!-- Hot tier -->
                <rect x="10"  y="50" width="80" height="40" rx="4" fill="var(--accent)" opacity="0.9"/>
                <text x="50" y="40" fill="currentColor" font-size="10" text-anchor="middle">Hot tier</text>
                <text x="50" y="75" fill="#fff" font-size="11" text-anchor="middle">NVMe</text>
                <text x="50" y="105" fill="currentColor" opacity="0.6" font-size="9" text-anchor="middle">last 1-7 d</text>
                <!-- arrow -->
                <line x1="95" y1="70" x2="135" y2="70" stroke="currentColor" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>
                <!-- Warm tier -->
                <rect x="140" y="50" width="80" height="40" rx="4" fill="#7dd3fc" opacity="0.75"/>
                <text x="180" y="40" fill="currentColor" font-size="10" text-anchor="middle">Warm tier</text>
                <text x="180" y="75" fill="#003e60" font-size="11" text-anchor="middle">RocksDB</text>
                <text x="180" y="105" fill="currentColor" opacity="0.6" font-size="9" text-anchor="middle">1-30 d</text>
                <line x1="225" y1="70" x2="265" y2="70" stroke="currentColor" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>
                <!-- Cold tier -->
                <rect x="270" y="50" width="80" height="40" rx="4" fill="#94a3b8" opacity="0.5"/>
                <text x="310" y="40" fill="currentColor" font-size="10" text-anchor="middle">Cold tier</text>
                <text x="310" y="75" fill="currentColor" font-size="11" text-anchor="middle">S3 / Azure</text>
                <text x="310" y="105" fill="currentColor" opacity="0.6" font-size="9" text-anchor="middle">unlimited PB</text>
                <defs>
                  <marker id="arr" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="8" markerHeight="8" orient="auto">
                    <path d="M0 0 L8 4 L0 8 z" fill="currentColor" opacity="0.5"/>
                  </marker>
                </defs>
              </g>
            </svg>
            <figcaption>Three-tier log: NVMe for active produce/consume, RocksDB for warm range scans, S3 for archive.</figcaption>
          </figure>
          <h4 class="metric-detail-sub">Tiering policy</h4>
          <p>Configurable per topic: max-segment-age, max-segment-size, target-tier. Default policy seals NVMe segments after 1 day, copies to RocksDB at 1 GB, ships to S3 after 7 days. Consumer reads stay transparent &mdash; cold segments are fetched on demand.</p>
          <p><a href="{{ '/docs/storage/tiered.html' | relative_url }}">Tiered-storage docs &rarr;</a></p>
        </template>
      </li>

      <li>
        <button type="button" class="metric-tile" data-metric-modal aria-haspopup="dialog">
          <span class="metric-value">0<span class="metric-unit">JVM</span></span>
          <span class="metric-label">pure .NET 10</span>
          <span class="metric-note">Native AOT, R2R, single-file</span>
          <span class="metric-hint" aria-hidden="true">More &rarr;</span>
        </button>
        <template class="metric-detail">
          <h3 class="metric-detail-title">Zero JVM. Pure .NET 10.</h3>
          <p class="metric-detail-lede">No JVM. No GC tuning. No heap sizing. Surgewave is a single .NET 10 executable, optionally Native-AOT compiled to a ~40 MB binary that starts in under a second.</p>
          <figure class="metric-detail-figure">
            <svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vergleich Startzeit + Memory">
              <g transform="translate(40,20)" font-family="ui-monospace, monospace">
                <line x1="0" y1="120" x2="320" y2="120" stroke="currentColor" stroke-opacity="0.4" stroke-width="1"/>
                <text x="0" y="14" fill="currentColor" opacity="0.7" font-size="10">Cold-start to ready</text>
                <!-- Kafka -->
                <rect x="0"   y="40" width="170" height="20" fill="#94a3b8" opacity="0.8"/>
                <text x="180" y="55" fill="currentColor" font-size="10">Apache Kafka — 18-25 s (JVM warm-up + KRaft)</text>
                <!-- Surgewave -->
                <rect x="0"   y="80" width="14"  height="20" fill="var(--accent)"/>
                <text x="24"  y="95" fill="currentColor" font-size="10">Surgewave native — &lt; 1 s</text>
              </g>
            </svg>
            <figcaption>Time from process start to broker accepting connections, single broker.</figcaption>
          </figure>
          <h4 class="metric-detail-sub">Operational implications</h4>
          <ul>
            <li>No <code>-Xmx</code> / <code>-Xms</code> tuning. .NET GC is self-managing.</li>
            <li>No ZooKeeper, no KRaft warm-up — Surgewave's Raft starts in the same process.</li>
            <li>Native AOT: ~40 MB binary, ~80 MB peak RSS at idle. Fits in a tight container or edge device.</li>
            <li>Embedded mode: same binary becomes a NuGet package you `await broker.StartAsync()` in your test fixture.</li>
          </ul>
        </template>
      </li>

    </ul>
    <p class="metrics-strip-footnote">
      Numbers are conservative measurements; multipliers are targets from
      <a href="{{ '/docs/benchmarks.html' | relative_url }}">reproducible benchmarks</a>
      against Apache Kafka on the same hardware.
      <span class="metrics-strip-footnote-hint">Click any tile for the methodology and chart.</span>
    </p>
  </div>
</section>

{%- comment -%}
Shared modal target — single instance per page, body gets filled with the
clicked tile's <template class="metric-detail"> content. Aria-hidden +
inert until opened. Pattern from Bowire's bowire-feature-modal.
{%- endcomment -%}
<div class="metric-detail-overlay" id="metric-detail-overlay" aria-hidden="true" inert>
  <div class="metric-detail-panel" role="dialog" aria-labelledby="metric-detail-title" aria-modal="true">
    <button type="button" class="metric-detail-close" aria-label="Close">
      <svg width="16" height="16" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
        <path d="M1 1l8 8M9 1l-8 8"/>
      </svg>
    </button>
    <div class="metric-detail-body" id="metric-detail-body"></div>
  </div>
</div>

<script>
  // Click on any .metric-tile inside metrics-strip clones the sibling
  // <template class="metric-detail"> content into #metric-detail-body and
  // opens the modal. Backdrop / Esc / close-button dismiss. Pattern mirrors
  // Bowire's bowire-feature-modal logic (see Bowire site/_layouts/default.html).
  (function () {
    var overlay = document.getElementById('metric-detail-overlay');
    if (!overlay) return;
    var body = document.getElementById('metric-detail-body');
    var closeBtn = overlay.querySelector('.metric-detail-close');

    function openFor(tile) {
      var li = tile.closest('li');
      if (!li) return;
      var tpl = li.querySelector('template.metric-detail');
      if (!tpl) return;
      body.innerHTML = '';
      body.appendChild(tpl.content.cloneNode(true));
      overlay.classList.add('is-open');
      overlay.setAttribute('aria-hidden', 'false');
      overlay.removeAttribute('inert');
      setTimeout(function () { closeBtn.focus(); }, 30);
    }
    function close() {
      overlay.classList.remove('is-open');
      overlay.setAttribute('aria-hidden', 'true');
      overlay.setAttribute('inert', '');
      body.innerHTML = '';
    }
    document.addEventListener('click', function (e) {
      var tile = e.target.closest('.metric-tile[data-metric-modal]');
      if (tile) { e.preventDefault(); openFor(tile); return; }
      if (e.target === overlay) close();
      if (e.target.closest('.metric-detail-close')) close();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && overlay.classList.contains('is-open')) close();
    });
  })();
</script>
