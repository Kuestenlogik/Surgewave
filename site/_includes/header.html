<header class="site-header">
  <div class="container header-inner">
    <a href="{{ '/' | relative_url }}" class="logo">
      {% include surgewave-mark.svg %}
      <span>Surgewave</span>
    </a>
    <nav class="header-nav">
      <a href="{{ '/features.html' | relative_url }}">Features</a>
      <a href="{{ '/docs/' | relative_url }}">Documentation</a>
      <a href="{{ '/download.html' | relative_url }}">Download</a>
      <a href="{{ '/services.html' | relative_url }}">Services</a>
      <a href="{{ '/community.html' | relative_url }}">Community</a>
    </nav>
    <div class="header-actions">
      <button class="surgewave-search-trigger" type="button" aria-label="Search" title="Search (press /)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <a href="{{ '/' | relative_url }}" class="nav-home" aria-label="Home" title="Home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 10.5 12 3l9 7.5"/>
          <path d="M5 9.5V21h14V9.5"/>
          <path d="M10 21v-6h4v6"/>
        </svg>
      </a>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme" title="Theme">
        {%- comment -%}
        Icon is injected by main.js based on the resolved theme state
        (sun / moon / monitor). Same pattern as Bowire so the toggle
        reads as a single icon instead of an "auto" text label.
        {%- endcomment -%}
      </button>
      <a href="https://github.com/Kuestenlogik/Surgewave" class="nav-github" aria-label="GitHub">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
      </a>
    </div>
  </div>
</header>
