description: Search the Surgewave documentation and marketing site.
permalink: /search.html
---

<section class="search-page">
  <h1 class="search-page-title">Search</h1>
  <p class="search-page-subtitle">Results from across the marketing site and the full Surgewave documentation.</p>
  <div id="search-page-results"></div>
</section>

<script>
  window.addEventListener('DOMContentLoaded', function () {
    if (!window.PagefindUI) return;
    var params = new URLSearchParams(window.location.search);
    var q = params.get('q') || '';
    var ui = new window.PagefindUI({
      element: '#search-page-results',
      show_images: false,
      show_sub_results: true,
      reset_styles: false,
      base_path: {{ '/pagefind/' | relative_url | jsonify }}
    });
    if (q) {
      ui.triggerSearch(q);
    }
  });
</script>
