name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'site/**'
      - 'src/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build site + docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Static link check on the source tree before any build runs. Catches
      # dead internal links between site/ pages and docs/ markdown without
      # waiting for the full build to come up red.
      - name: Setup Node for link-check
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Check internal links
        run: node scripts/check-internal-links.mjs

      # DocFX technical docs — built from the full solution so API metadata
      # can be extracted from the source assemblies.
      - name: Build projects (for API docs)
        run: dotnet build Kuestenlogik.Surgewave.slnx --configuration Release

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build DocFX documentation
        run: docfx docs/docfx.json

      # Jekyll marketing site — landing + features + legal + privacy.
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: site

      - name: Build Jekyll site
        run: |
          cd site
          bundle install
          bundle exec jekyll build

      # Combine: Jekyll at the root, DocFX under /docs/.
      - name: Combine outputs
        run: |
          mkdir -p _combined
          cp -r site/_site/. _combined/
          mkdir -p _combined/docs
          cp -r artifacts/docs/. _combined/docs/

      # Pagefind builds a client-side full-text search index over the
      # already-rendered HTML — marketing + docs in one index. No runtime
      # server, shipped as static JS alongside the site.
      - name: Setup Node for Pagefind
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Generate Pagefind search index
        run: npx -y pagefind --site _combined --output-path _combined/pagefind

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _combined

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
