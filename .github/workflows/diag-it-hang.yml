name: Diag IntegrationTests hang

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: dotnet build tests/Kuestenlogik.Surgewave.IntegrationTests -c Release
      - name: Test with hang dump
        # 120s pro Test ist viel grosszuegiger als die EOS-Diag, weil
        # IntegrationTests Multi-Broker und Performance-Suites enthaelt.
        run: dotnet test tests/Kuestenlogik.Surgewave.IntegrationTests -c Release --no-build -v normal --blame-hang-timeout 120s --blame-hang-dump-type full --logger "console;verbosity=detailed"
        continue-on-error: true
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: it-hang-diagnostics
          path: |
            tests/**/TestResults/**/*.dmp
            tests/**/TestResults/**/*.xml
            tests/**/TestResults/**/Sequence*
          if-no-files-found: warn
