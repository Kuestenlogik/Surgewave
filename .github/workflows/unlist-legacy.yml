name: Unlist legacy 0.1.x

# Einmaliger Helper, um die Pre-Bowire-Pattern-Generation (Kuestenlogik.
# Surgewave.* 0.1.0–0.1.9 plus die kebab-Altlasten surgewave / surgewave-
# broker) auf nuget.org zu unlisten. Nach erfolgreichem Lauf darf dieser
# Workflow wieder geloescht werden — er ist nur fuer dieses eine Cleanup
# gedacht. `dotnet nuget delete` heisst auf nuget.org effektiv "unlist":
# bestehende Restore-Caches und direkte Version-Pin-Anfragen funktionieren
# weiter, aber Search/Range-Resolution uebergeht die Versionen.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Nur listen, nichts loeschen (true/false)"
        required: false
        default: "true"

permissions:
  contents: read

jobs:
  unlist:
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      NUGET_SOURCE: https://api.nuget.org/v3/index.json

    steps:
      - name: Sanity-check
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY secret nicht gesetzt"
            exit 1
          fi
          echo "Dry-run: ${{ inputs.dry_run }}"

      - name: Unlist Kuestenlogik.Surgewave.* 0.1.0–0.1.9
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -e
          # Vollstaendige Search-API durchblaettern (10er-Pages reichen, die
          # Suchergebnisse enthalten alle Kuestenlogik.Surgewave.*-IDs).
          skip=0
          ids=$(
            while :; do
              page=$(curl -s "https://azuresearch-usnc.nuget.org/query?q=kuestenlogik.surgewave&take=50&skip=$skip&prerelease=true")
              # `Connector.*` lebt im Schwester-Repo Surgewave.Connectors,
              # `Schema.Registry.Handlers.*` im Schema-Registry-Repo. Beide
              # haben ihren eigenen Versions-Lebenszyklus und werden nicht
              # mit der Hauptrepo-Generation 0.1.0–0.1.9 ent-listet.
              names=$(echo "$page" | jq -r '.data[].id' | grep -i '^Kuestenlogik\.Surgewave\.' | grep -v -i '^Kuestenlogik\.Surgewave\.Connector\.' | grep -v -i '^Kuestenlogik\.Surgewave\.Schema\.Registry\.Handlers\.' || true)
              [ -z "$names" ] && break
              echo "$names"
              skip=$((skip + 50))
              total=$(echo "$page" | jq -r '.totalHits')
              [ "$skip" -ge "$total" ] && break
            done | sort -u
          )

          for id in $ids; do
            echo "::group::$id"
            versions=$(curl -s "https://api.nuget.org/v3-flatcontainer/$(echo $id | tr '[:upper:]' '[:lower:]')/index.json" | jq -r '.versions[]?' | grep -E '^0\.1\.[0-9]+$' | grep -v '^0\.1\.10$' || true)
            for v in $versions; do
              # Pre-check immer, egal ob dry-run, damit wir wissen wie der
              # Stand auf nuget.org ist (welche Versionen schon unlisted
              # sind, ohne Unlist-Quota zu verbrauchen).
              lower_id=$(echo "$id" | tr '[:upper:]' '[:lower:]')
              reg=$(curl -s -w "\n%{http_code}" "https://api.nuget.org/v3/registration5-semver1/$lower_id/$v.json" 2>/dev/null)
              code=$(echo "$reg" | tail -n1)
              body=$(echo "$reg" | sed '$d')
              if [ "$code" = "404" ]; then
                echo "(skip: $id $v not in registration index)"
                continue
              fi
              listed=$(echo "$body" | jq -r 'if has("listed") then .listed | tostring else "unknown" end' 2>/dev/null || echo "unknown")
              echo "(pre-check $id $v code=$code listed=$listed)"
              if [ "$listed" = "false" ]; then
                echo "(skip: $id $v already unlisted)"
                continue
              fi
              if [ "$DRY_RUN" = "true" ]; then
                echo "[dry-run] would unlist $id $v"
              else
                echo "unlist $id $v"
                # `dotnet nuget delete` failt mit Exit 1 fuer mehrere
                # Bedingungen — versteckt verschluckt wuerde der Workflow
                # einen abgelaufenen / unzureichend permittierten API-Key
                # als "success" labeln. Wir trennen daher: 404 = bereits
                # unlisted oder nie published (OK), alles andere = hart.
                # 1s Pause zwischen echten Unlist-Calls (nicht nach skips).
                sleep 1
                if out=$(dotnet nuget delete "$id" "$v" --source "$NUGET_SOURCE" --api-key "$NUGET_API_KEY" --non-interactive 2>&1); then
                  echo "$out"
                elif echo "$out" | grep -q "404"; then
                  echo "(skip 404: $id $v already unlisted or never published)"
                else
                  echo "::error::$id $v failed:"
                  echo "$out"
                  exit 1
                fi
              fi
            done
            echo "::endgroup::"
          done

      - name: Unlist legacy kebab IDs (surgewave, surgewave-broker)
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -e
          for id in surgewave surgewave-broker; do
            echo "::group::$id"
            versions=$(curl -s "https://api.nuget.org/v3-flatcontainer/$id/index.json" | jq -r '.versions[]?' || true)
            for v in $versions; do
              # Pre-check immer (siehe oberer Block).
              reg=$(curl -s -w "\n%{http_code}" "https://api.nuget.org/v3/registration5-semver1/$id/$v.json" 2>/dev/null)
              code=$(echo "$reg" | tail -n1)
              body=$(echo "$reg" | sed '$d')
              if [ "$code" = "404" ]; then
                echo "(skip: $id $v not in registration index)"
                continue
              fi
              listed=$(echo "$body" | jq -r 'if has("listed") then .listed | tostring else "unknown" end' 2>/dev/null || echo "unknown")
              echo "(pre-check $id $v code=$code listed=$listed)"
              if [ "$listed" = "false" ]; then
                echo "(skip: $id $v already unlisted)"
                continue
              fi
              if [ "$DRY_RUN" = "true" ]; then
                echo "[dry-run] would unlist $id $v"
              else
                sleep 1
                echo "unlist $id $v"
                if out=$(dotnet nuget delete "$id" "$v" --source "$NUGET_SOURCE" --api-key "$NUGET_API_KEY" --non-interactive 2>&1); then
                  echo "$out"
                elif echo "$out" | grep -q "404"; then
                  echo "(skip 404: $id $v already unlisted or never published)"
                else
                  echo "::error::$id $v failed:"
                  echo "$out"
                  exit 1
                fi
              fi
            done
            echo "::endgroup::"
          done
