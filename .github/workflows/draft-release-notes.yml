# Draft the editorial release-notes body for the next release and open a PR.
#
# Bowire-Konzept (docs/release-notes/): die kuratierte Prosa der NAECHSTEN
# Version lebt in docs/release-notes/upcoming.md (Front-matter: title +
# version). release.yml gated auf dieses File (mind. eine ###-Section) und
# nutzt es als GitHub-Release-Body; RELEASE_NOTES.md ist nur noch ein
# generierter Mirror (scripts/ci/generate-release-notes.mjs).
#
# Dieser Workflow fuellt upcoming.md ~80 % vor: Theme aus dem Milestone-
# Titel, Highlights aus den geschlossenen Milestone-Issues (gebuckelt nach
# area/kind), Maintenance aus dem Commit-Log seit dem letzten Tag. Die
# Bullets sind ABSICHTLICH keine ###-Sections — das Release-Gate erzwingt
# so die Kuratierung (Bullets zu ###-Prosa umschreiben), bevor ein Tag
# shippen kann. Review den PR, poliere, merge, dann tagge.
#
# Schutz: ein upcoming.md, das bereits kuratierte ###-Sections traegt,
# wird NICHT ueberschrieben — der Workflow bricht dann mit Hinweis ab.
#
# Trigger: workflow_dispatch mit einer Version wie `0.5.0` (mit oder ohne v).

name: Draft release notes

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to draft notes for (e.g. 0.5.0). With or without leading v.'
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: read

concurrency:
  group: draft-release-notes-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.SURGEWAVE_DISPATCH_TOKEN }}
          fetch-depth: 0

      - name: Guard — refuse to overwrite curated content
        run: |
          set -euo pipefail
          if [ -f docs/release-notes/upcoming.md ]; then
            BODY=$(awk 'BEGIN{fm=0} /^---$/{fm++; next} fm<2{next} {print}' docs/release-notes/upcoming.md)
            SECTION_COUNT=$(echo "$BODY" | grep -cE '^### ' || true)
            if [ "${SECTION_COUNT:-0}" -gt 0 ]; then
              echo "::error::docs/release-notes/upcoming.md traegt bereits ${SECTION_COUNT} kuratierte ###-Section(s) — dieser Workflow ueberschreibt keine Kuratierung. Manuell editieren."
              exit 1
            fi
          fi

      - name: Resolve milestone + theme
        id: ms
        env:
          GH_TOKEN: ${{ secrets.SURGEWAVE_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          RAW="${{ github.event.inputs.version }}"
          VERSION="${RAW#v}"
          BASE=$(echo "$VERSION" | sed -E 's/-.*$//')
          MAJ_MIN=$(echo "$BASE" | cut -d. -f1-2)

          # Match milestone whose title starts with `v${BASE}` OR
          # `v${MAJ_MIN}` followed by either end-of-string or ` — `.
          MS_TITLES=$(gh api "repos/${{ github.repository }}/milestones?state=all&per_page=100" --jq '.[].title')
          MS_TITLE=""
          for candidate in "v${BASE}" "v${MAJ_MIN}"; do
            match=$(echo "$MS_TITLES" | grep -E "^${candidate}([[:space:]]+[—-][[:space:]]+.+)?$" | head -n 1 || true)
            if [ -n "$match" ]; then
              MS_TITLE="$match"
              break
            fi
          done

          if [ -z "$MS_TITLE" ]; then
            echo "::warning::No milestone matches v${BASE} or v${MAJ_MIN} — drafting without a theme + issue list."
            THEME=""
          else
            THEME=$(echo "$MS_TITLE" | sed -E 's/^v[[:alnum:].-]+[[:space:]]+[—-][[:space:]]+//; t; s/.*//')
          fi

          {
            echo "version=$VERSION"
            echo "milestone=$MS_TITLE"
            echo "theme=$THEME"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$VERSION milestone='$MS_TITLE' theme='$THEME'"

      - name: Generate upcoming.md draft
        env:
          GH_TOKEN: ${{ secrets.SURGEWAVE_DISPATCH_TOKEN }}
          VERSION: ${{ steps.ms.outputs.version }}
          MS_TITLE: ${{ steps.ms.outputs.milestone }}
          THEME: ${{ steps.ms.outputs.theme }}
        run: |
          set -euo pipefail
          PREV_TAG=$(git tag --sort=-version:refname --list 'v*' | head -n 1)
          if [ -z "$PREV_TAG" ]; then PREV_TAG=$(git rev-list --max-parents=0 HEAD); fi
          echo "Previous tag: $PREV_TAG"

          # ---- Highlights aus geschlossenen Milestone-Issues ----
          HIGHLIGHTS=""
          if [ -n "$MS_TITLE" ]; then
            ISSUES_JSON=$(gh issue list --milestone "$MS_TITLE" --state closed \
              --limit 100 --json number,title,labels)
            HIGHLIGHTS=$(echo "$ISSUES_JSON" | jq -r '
              def bucket(labels):
                ( (labels | map(select(.name | startswith("area:")) | .name | sub("area:"; ""))[0])
                  // (labels | map(select(.name | startswith("kind:")) | .name | sub("kind:"; ""))[0])
                  // "misc" );
              [ .[] | { bucket: bucket(.labels), entry: "- #\(.number) \(.title)" } ]
              | group_by(.bucket)
              | map({bucket: .[0].bucket, entries: map(.entry)})
              | sort_by(.bucket)
              | map("**\(.bucket)**\n\(.entries | join("\n"))\n")
              | join("\n")
            ')
          fi

          # ---- Maintenance aus dem Commit-Log ----
          MAINT=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s" --no-merges \
            | grep -E "^(fix|refactor|perf|test|ci|build|chore|docs)(\(.+\))?:" \
            | grep -vE "^chore\(roadmap\):|^chore: bump floor" \
            | head -n 30 \
            | sed 's/^/- /' \
            || true)

          # ---- upcoming.md schreiben ----
          mkdir -p docs/release-notes
          {
            echo "---"
            if [ -n "$THEME" ]; then
              echo "title: ${THEME}"
            else
              echo "title: <fill in before the tag — matches the milestone theme>"
            fi
            echo "version: ${VERSION}"
            echo "---"
            echo ""
            echo "<One-sentence frame for what ${VERSION} is about — replace before tagging.>"
            echo ""
            echo "## Highlights"
            echo ""
            echo "<!-- Kuratierung erforderlich: die Bullets unten zu ###-Sections mit"
            echo "     2-4 Saetzen Prosa umschreiben — das Release-Gate verlangt"
            echo "     mindestens eine ###-Section. Muster: ### <headline> (#issue) -->"
            echo ""
            if [ -n "$HIGHLIGHTS" ]; then
              echo "$HIGHLIGHTS"
            else
              echo "_No closed issues in the milestone yet._"
              echo ""
            fi
            if [ -n "$MAINT" ]; then
              echo "## Fixes"
              echo ""
              echo "<!-- Aus dem Commit-Log; gruppieren + auf das Nennenswerte kuerzen. -->"
              echo ""
              echo "$MAINT"
              echo ""
            fi
            echo "## Breaking changes"
            echo ""
            echo "<!-- Only when real — with the migration path. -->"
            echo ""
            echo "## Acknowledgements"
            echo ""
            echo "<!-- Optional. -->"
          } > docs/release-notes/upcoming.md
          echo "----- drafted upcoming.md -----"
          cat docs/release-notes/upcoming.md
          echo "----- end -----"

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.SURGEWAVE_DISPATCH_TOKEN }}
          VERSION: ${{ steps.ms.outputs.version }}
        run: |
          set -euo pipefail
          BRANCH="chore/release-notes-v${VERSION}"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # Branch auf Rerun wiederverwenden statt Orphan-Branches zu erzeugen.
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git checkout main -- docs/release-notes/upcoming.md 2>/dev/null || true
          else
            git checkout -b "$BRANCH"
          fi

          if git ls-files --error-unmatch docs/release-notes/upcoming.md > /dev/null 2>&1 && git diff --quiet docs/release-notes/upcoming.md; then
            echo "::notice::upcoming.md unchanged — draft for v${VERSION} likely already committed."
            exit 0
          fi
          git add docs/release-notes/upcoming.md
          git commit -m "chore: draft release notes for v${VERSION}"
          git push -u origin "$BRANCH" --force-with-lease

          if ! gh pr list --head "$BRANCH" --state open --json number -q '.[0].number' | grep -q .; then
            # Body via heredoc → file → --body-file (Inline-Markdown in
            # --body "..." bricht YAMLs literal-block-scalar-Parsing).
            cat > .pr-body.md <<PRBODY
            Auto-drafted \`docs/release-notes/upcoming.md\` for v${VERSION} via the \`Draft release notes\` workflow.

            **Before merging:**
            1. Rewrite the Highlights bullets into \`###\` sections with 2-4 sentences of prose each — the release gate requires at least one \`###\` section, so an un-curated draft cannot ship.
            2. Trim the Fixes bullets to the notable ones (roadmap-sync + floor-bump noise is already filtered).
            3. Check the front-matter \`title:\` against the milestone theme — the release title resolves from the milestone at tag time.

            After merge, push the \`v${VERSION}\` tag — \`release.yml\` uses this file as the GitHub Release body (with the Installation block collapsed below it and the auto-generated commit list after the seam).
            PRBODY
            sed -i 's/^            //' .pr-body.md
            gh pr create \
              --title "chore: draft release notes for v${VERSION}" \
              --body-file .pr-body.md \
              --label 'roadmap' \
              --base main \
              --head "$BRANCH"
            rm -f .pr-body.md
          else
            echo "PR already open for $BRANCH — pushed update, no new PR."
          fi
