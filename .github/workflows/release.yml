name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  # ================================================================
  # verify-notes: Gate — kein Release ohne kuratierten Body
  # ================================================================
  # Bowire-Pattern (docs/release-notes/): der GitHub-Release-Body ist
  # kuratierte Prosa aus dem Repo, nicht Installations-Boilerplate.
  # Source-of-truth-Kette:
  #   1) docs/release-notes/v<tag>.md  (konservierter Body)
  #   2) docs/release-notes/upcoming.md (kanonischer Pfad vor dem Tag)
  #   3) Legacy: Body eines GitHub-Draft-Release fuer den Tag
  # Fail-fast hier spart die komplette Build-Zeit und verhindert das
  # "mit Platzhalter-Body geshippt, im Nachgang editiert"-Muster.
  verify-notes:
    name: Verify curated release notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify curated release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          FILE_BODY=""
          for candidate in "docs/release-notes/${TAG}.md" "docs/release-notes/upcoming.md"; do
            if [[ -f "$candidate" ]]; then
              # Front-matter strippen; "echt" ist ein Body erst mit
              # mindestens einer ###-Section (Platzhalter-Erkennung —
              # das Template traegt nur ##-Headings + HTML-Kommentare).
              BODY=$(awk 'BEGIN{fm=0} /^---$/{fm++; next} fm<2{next} {print}' "$candidate")
              SECTION_COUNT=$(echo "$BODY" | grep -cE '^### ' || true)
              if [[ "${SECTION_COUNT:-0}" -gt 0 ]]; then
                FILE_BODY="$candidate"
                break
              fi
            fi
          done
          if [[ -n "$FILE_BODY" ]]; then
            echo "✓ Kuratierter Body fuer ${TAG} gefunden: ${FILE_BODY}"
            exit 0
          fi
          # Legacy-Fallback: GitHub-Draft-Release-Body.
          BODY=$(gh api "repos/${{ github.repository }}/releases" --jq ".[] | select(.tag_name == \"${TAG}\") | .body" 2>/dev/null | head -c 200 || true)
          if [[ -n "$BODY" ]]; then
            echo "✓ Kuratierter Body fuer ${TAG} gefunden (legacy: GitHub-Draft-Release)"
            exit 0
          fi
          echo "::error::Kein kuratierter Release-Body fuer ${TAG} gefunden."
          echo ""
          echo "Kuratiere docs/release-notes/upcoming.md (mind. eine ###-Section),"
          echo "committe + pushe, und pushe den Tag danach erneut."
          echo "Konvention: docs/release-notes/README.md"
          exit 1

  # ================================================================
  # build-msi: WiX MSI build (Windows-only)
  # ================================================================
  # WiX v5 ist Windows-only (`warning WIX0000: WiX Toolset only supports
  # Windows`) — der MSI-Build kann deshalb nicht im linux-basierten
  # release-Job laufen. Bowire-Pattern: eigenes windows-latest-Job baut
  # nur die .msi, uploaded sie als Artefakt, und der release-Job
  # downloaded sie wieder vorm GitHub-Release-Schritt.
  build-msi:
    name: Build Windows MSI
    needs: [verify-notes]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # Self-contained win-x64 publishes fuer Broker, CLI, Control —
      # diese werden direkt von der wixproj per BrokerPublishDir / CliPublishDir
      # / ControlPublishDir referenziert.
      - name: Publish win-x64 binaries (broker / cli / control)
        shell: bash
        env:
          V: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet publish src/Kuestenlogik.Surgewave.Broker  -c Release -r win-x64 --self-contained -o deployments/installer/publish/broker  -p:Version=$V
          dotnet publish src/Kuestenlogik.Surgewave.Tool     -c Release -r win-x64 --self-contained -o deployments/installer/publish/cli     -p:Version=$V
          dotnet publish src/Kuestenlogik.Surgewave.Control -c Release -r win-x64 --self-contained -o deployments/installer/publish/control -p:Version=$V
          cp deployments/installer/config/appsettings.json            deployments/installer/publish/broker/
          cp deployments/installer/config/appsettings.Production.json deployments/installer/publish/broker/

      - name: Generate icon if missing
        shell: pwsh
        run: |
          $icon = "deployments/installer/Kuestenlogik.Surgewave.Installer/surgewave.ico"
          if (-not (Test-Path $icon)) {
            pwsh -NoProfile -File deployments/installer/Kuestenlogik.Surgewave.Installer/generate-icon.ps1
          }

      # Die wixproj nutzt das WixToolset.Sdk (PackageReference auf
      # WixToolset.UI.wixext), also reicht `dotnet build` — kein
      # separates `wix`-Tool muss global installiert werden.
      #
      # PublishDirs muessen absolute Windows-Pfade sein (`pwd -W` in
      # Git-Bash auf windows-latest gibt den Windows-Style-Pfad zurueck).
      - name: Build MSI
        shell: bash
        env:
          V: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet build deployments/installer/Kuestenlogik.Surgewave.Installer/Kuestenlogik.Surgewave.Installer.wixproj \
            -c Release \
            -p:Version=$V \
            -p:BrokerPublishDir="$(pwd -W)/deployments/installer/publish/broker" \
            -p:CliPublishDir="$(pwd -W)/deployments/installer/publish/cli" \
            -p:ControlPublishDir="$(pwd -W)/deployments/installer/publish/control"
          mkdir -p msi-out
          # Directory.Build.props lenkt BaseOutputPath auf artifacts/bin/...
          # um, deshalb landet die MSI nicht unter deployments/installer/.
          # Wir suchen im ganzen Repo nach *.msi (es gibt nur die eine).
          find . -name '*.msi' -not -path './msi-out/*' -exec cp {} msi-out/surgewave-$V-win-x64.msi \;
          ls -la msi-out

      - name: Upload MSI artefact
        uses: actions/upload-artifact@v7
        with:
          name: artefacts-msi
          path: msi-out/*.msi
          retention-days: 1

  # ================================================================
  # release: NuGets, Container, Linux-/macOS-Binaries, Release-Assembly
  # ================================================================
  release:
    runs-on: ubuntu-latest
    needs: [build-msi]

    # Job-level env damit das Secret in step-level `if:`-Ausdruecken sichtbar
    # ist (der `secrets`-Context ist dort nicht direkt verfuegbar). Empty
    # string wenn das Org-Secret nicht gesetzt ist, sodass die `env.X != ''`-
    # Gates korrekt skippen statt zu failen. Bowire-Pattern.
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore Kuestenlogik.Surgewave.slnx

      - name: Build
        run: dotnet build Kuestenlogik.Surgewave.slnx -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        # IntegrationTests (multi-broker replication, sasl-roundtrip, …) are
        # excluded from the release-tag run because they bring up real TCP
        # cluster topology and are flakier on the GitHub-Actions runner than
        # on bare-metal CI. They still run on every push to main via ci.yml.
        #
        # -m:1: Assemblies seriell (siehe ci.yml).
        # --blame-hang-timeout + dump-type: fail-fast bei hängendem Test,
        # Dump als Artifact zur Thread-Trace-Analyse.
        run: dotnet test Kuestenlogik.Surgewave.slnx -c Release --no-build -v normal -m:1 --blame-hang-timeout 300s --blame-hang-dump-type full

      - name: Pack NuGet
        run: dotnet pack Kuestenlogik.Surgewave.slnx -c Release --no-build -o artifacts/packages -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository owner for GHCR
        # GHCR rejects uppercase registry segments. github.repository_owner
        # is "Kuestenlogik" (capital K) for this org, so we lower-case it
        # once and reuse the result for the Broker + Control container
        # publishes.
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------
      # Multi-arch Container → GHCR (immer) + Docker Hub (optional)
      # ----------------------------------------------------------
      # `ContainerRuntimeIdentifiers` macht aus einem `dotnet publish`-
      # Call mehrere arch-spezifische Image-Builds in einem Schwung
      # und published als Multi-Arch-Manifest. Das Pre-Restore braucht
      # die gleiche RID-Liste, sonst failed der Container-Publish mit
      # `NETSDK1047: Assets file ... doesn't have a target for
      # 'net10.0/linux-arm64'`.
      #
      # `ContainerImageTags="$V;latest"` taggt die Images doppelt.
      # Die innere Quoting-Form ist noetig damit MSBuild das ';' als
      # Property-Wert sieht statt als Argument-Separator.
      #
      # ContainerRegistry nimmt nur den Host ("ghcr.io"); der org/image-
      # Pfad geht via ContainerRepository. Beides kombiniert
      # ("ghcr.io/<owner>") triggert CONTAINER2012 "could not recognise
      # registry" weil das SDK das als literalen Host nimmt.
      - name: Pre-restore Broker (multi-RID)
        run: |
          dotnet restore src/Kuestenlogik.Surgewave.Broker \
            "-p:RuntimeIdentifiers=\"linux-x64;linux-arm64\""

      - name: Pre-restore Control (multi-RID)
        run: |
          dotnet restore src/Kuestenlogik.Surgewave.Control \
            "-p:RuntimeIdentifiers=\"linux-x64;linux-arm64\""

      - name: Push Broker container to GHCR (multi-arch)
        env:
          V: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet publish src/Kuestenlogik.Surgewave.Broker \
            -c Release \
            -t:PublishContainer \
            --no-restore \
            -p:Version=$V \
            -p:GeneratePackageOnBuild=false \
            "-p:ContainerRuntimeIdentifiers=\"linux-x64;linux-arm64\"" \
            "-p:ContainerImageTags=\"$V;latest\"" \
            -p:ContainerRegistry=ghcr.io \
            -p:ContainerRepository=${{ steps.ghcr.outputs.owner }}/surgewave-broker

      - name: Push Control container to GHCR (multi-arch)
        env:
          V: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet publish src/Kuestenlogik.Surgewave.Control \
            -c Release \
            -t:PublishContainer \
            --no-restore \
            -p:Version=$V \
            -p:GeneratePackageOnBuild=false \
            "-p:ContainerRuntimeIdentifiers=\"linux-x64;linux-arm64\"" \
            "-p:ContainerImageTags=\"$V;latest\"" \
            -p:ContainerRegistry=ghcr.io \
            -p:ContainerRepository=${{ steps.ghcr.outputs.owner }}/surgewave-control

      # Docker Hub ist gated: ohne DOCKERHUB_TOKEN + DOCKERHUB_USERNAME
      # wird skip-ohne-fail gemacht, das GHCR-Image ist die offizielle
      # Quelle und Docker Hub die zweite Distribution.
      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      # Die GHCR-Steps oben haben die Multi-RID-Assets bereits aufgebaut,
      # `--no-restore` reused den Cache. Der einzige zusaetzliche Aufwand
      # ist der Registry-Push selbst — Image ist byte-identisch zu GHCR.
      # Namespace ist fix auf `kuestenlogik` — dem Org-Namespace auf
      # Docker Hub. DOCKERHUB_USERNAME ist nur der Login-User (kann ein
      # User-Account mit Push-Rechten auf die Org sein), nicht der
      # Repository-Namespace.
      - name: Push Broker container to Docker Hub (multi-arch)
        if: ${{ env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_USERNAME != '' }}
        env:
          V: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet publish src/Kuestenlogik.Surgewave.Broker \
            -c Release \
            -t:PublishContainer \
            --no-restore \
            -p:Version=$V \
            -p:GeneratePackageOnBuild=false \
            "-p:ContainerRuntimeIdentifiers=\"linux-x64;linux-arm64\"" \
            "-p:ContainerImageTags=\"$V;latest\"" \
            -p:ContainerRegistry=docker.io \
            -p:ContainerRepository=kuestenlogik/surgewave-broker

      - name: Push Control container to Docker Hub (multi-arch)
        if: ${{ env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_USERNAME != '' }}
        env:
          V: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet publish src/Kuestenlogik.Surgewave.Control \
            -c Release \
            -t:PublishContainer \
            --no-restore \
            -p:Version=$V \
            -p:GeneratePackageOnBuild=false \
            "-p:ContainerRuntimeIdentifiers=\"linux-x64;linux-arm64\"" \
            "-p:ContainerImageTags=\"$V;latest\"" \
            -p:ContainerRegistry=docker.io \
            -p:ContainerRepository=kuestenlogik/surgewave-control

      # Self-contained Broker binaries (no .NET SDK needed on target)
      - name: Publish Broker binaries
        run: |
          dotnet publish src/Kuestenlogik.Surgewave.Broker -c Release -r linux-x64 --self-contained -o ./publish/surgewave-broker-linux-x64 -p:Version=${{ steps.version.outputs.VERSION }}
          dotnet publish src/Kuestenlogik.Surgewave.Broker -c Release -r linux-arm64 --self-contained -o ./publish/surgewave-broker-linux-arm64 -p:Version=${{ steps.version.outputs.VERSION }}
          dotnet publish src/Kuestenlogik.Surgewave.Broker -c Release -r win-x64 --self-contained -o ./publish/surgewave-broker-win-x64 -p:Version=${{ steps.version.outputs.VERSION }}
          dotnet publish src/Kuestenlogik.Surgewave.Broker -c Release -r osx-x64 --self-contained -o ./publish/surgewave-broker-osx-x64 -p:Version=${{ steps.version.outputs.VERSION }}
          dotnet publish src/Kuestenlogik.Surgewave.Broker -c Release -r osx-arm64 --self-contained -o ./publish/surgewave-broker-osx-arm64 -p:Version=${{ steps.version.outputs.VERSION }}

      # Self-contained Control UI binaries
      - name: Publish Control binaries
        run: |
          dotnet publish src/Kuestenlogik.Surgewave.Control -c Release -r linux-x64 --self-contained -o ./publish/surgewave-control-linux-x64 -p:Version=${{ steps.version.outputs.VERSION }}
          dotnet publish src/Kuestenlogik.Surgewave.Control -c Release -r win-x64 --self-contained -o ./publish/surgewave-control-win-x64 -p:Version=${{ steps.version.outputs.VERSION }}

      # Self-contained CLI binaries. macOS variants drive the Homebrew tap;
      # linux + win cover the Chocolatey / direct-download story.
      - name: Publish CLI binaries
        run: |
          dotnet publish src/Kuestenlogik.Surgewave.Tool -c Release -r linux-x64 --self-contained -o ./publish/surgewave-cli-linux-x64 -p:Version=${{ steps.version.outputs.VERSION }}
          dotnet publish src/Kuestenlogik.Surgewave.Tool -c Release -r linux-arm64 --self-contained -o ./publish/surgewave-cli-linux-arm64 -p:Version=${{ steps.version.outputs.VERSION }}
          dotnet publish src/Kuestenlogik.Surgewave.Tool -c Release -r win-x64 --self-contained -o ./publish/surgewave-cli-win-x64 -p:Version=${{ steps.version.outputs.VERSION }}
          dotnet publish src/Kuestenlogik.Surgewave.Tool -c Release -r osx-x64 --self-contained -o ./publish/surgewave-cli-osx-x64 -p:Version=${{ steps.version.outputs.VERSION }}
          dotnet publish src/Kuestenlogik.Surgewave.Tool -c Release -r osx-arm64 --self-contained -o ./publish/surgewave-cli-osx-arm64 -p:Version=${{ steps.version.outputs.VERSION }}

      # Windows MSI kommt aus dem build-msi-Job (Windows-Runner) als Artefakt.
      # WiX v5 ist Windows-only, deshalb laesst er sich nicht im linux-basierten
      # release-Job inline bauen — siehe oben.
      - name: Download MSI artefact
        uses: actions/download-artifact@v8
        with:
          name: artefacts-msi
          path: publish/

      # Build .deb and .rpm packages
      - name: Build Linux packages
        run: |
          chmod +x deployments/installer/linux/build-packages.sh
          cd deployments/installer/linux
          bash build-packages.sh ${{ steps.version.outputs.VERSION }} amd64
          cp build/*.deb ../../../publish/ 2>/dev/null || true
          cp build/*.rpm ../../../publish/ 2>/dev/null || true

      # Create tar.gz/zip archives
      - name: Create archives
        run: |
          cd publish
          for dir in surgewave-broker-linux-* surgewave-broker-osx-* surgewave-control-linux-*; do
            [ -d "$dir" ] && tar -czvf "${dir}-${{ steps.version.outputs.VERSION }}.tar.gz" -C "$dir" .
          done
          for dir in surgewave-broker-win-* surgewave-control-win-* surgewave-cli-win-*; do
            [ -d "$dir" ] && zip -r "${dir}-${{ steps.version.outputs.VERSION }}.zip" "$dir"
          done
          # CLI tarballs cover linux + macOS — they drive the Homebrew tap.
          for dir in surgewave-cli-linux-* surgewave-cli-osx-*; do
            [ -d "$dir" ] && tar -czvf "${dir}-${{ steps.version.outputs.VERSION }}.tar.gz" -C "$dir" .
          done

      - name: Publish NuGet to GitHub Packages
        run: dotnet nuget push ./artifacts/packages/*.nupkg --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      # nuget.org: nur auf stabilen Tags (kein `-rc` Suffix) und nur wenn das
      # Secret konfiguriert ist. NUGET_API_KEY braucht den 'Push new packages
      # and package versions'-Scope mit Glob `Kuestenlogik.Surgewave.*` bzw.
      # `surgewave*` (kebab-IDs fuer Executables).
      - name: Publish NuGet to nuget.org
        if: ${{ !contains(github.ref, '-rc') && env.NUGET_API_KEY != '' }}
        run: |
          dotnet nuget push "./artifacts/packages/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: release-packages-${{ steps.version.outputs.VERSION }}
          path: artifacts/packages/*.nupkg

      # Bowire-Pattern: der kuratierte Body kommt aus docs/release-notes/
      # (v<tag>.md → upcoming.md → Legacy-Draft), Front-matter wird
      # gestrippt, die Installations-Kommandos wandern in einen
      # eingeklappten <details>-Block, und ein Seam trennt Editorial
      # von der auto-generierten Commit-Liste.
      - name: Pull editorial body (file first, GitHub draft as fallback)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          V="${{ steps.version.outputs.VERSION }}"
          NOTES=""
          for candidate in "docs/release-notes/${TAG}.md" "docs/release-notes/upcoming.md"; do
            if [[ -f "$candidate" ]]; then
              CANDIDATE_BODY=$(awk 'BEGIN{fm=0} /^---$/{fm++; next} fm<2{next} {print}' "$candidate")
              SECTION_COUNT=$(echo "$CANDIDATE_BODY" | grep -cE '^### ' || true)
              if [[ "${SECTION_COUNT:-0}" -gt 0 ]]; then
                NOTES="$CANDIDATE_BODY"
                echo "Using editorial body from ${candidate} (${SECTION_COUNT} section(s))"
                break
              else
                echo "Skipping ${candidate} — no ### subsections detected (treated as placeholder)."
              fi
            fi
          done
          if [[ -z "$NOTES" ]]; then
            NOTES=$(gh api "repos/${{ github.repository }}/releases" \
              --jq ".[] | select(.tag_name == \"${TAG}\") | .body" 2>/dev/null || true)
            [[ -n "$NOTES" ]] && echo "Using editorial body from GitHub draft release (legacy)."
          fi
          {
            if [[ -z "$NOTES" ]]; then
              echo "## $TAG"
              echo ""
              echo "_See the auto-generated change list below._"
            else
              echo "$NOTES"
            fi
            echo ""
            echo "<details>"
            echo "<summary><b>Installation</b> — NuGet, Container, MSI, Linux, Helm</summary>"
            echo ""
            echo "**NuGet:**"
            echo '```bash'
            echo "dotnet add package Kuestenlogik.Surgewave.Client --version ${V}"
            echo '```'
            echo ""
            echo "**Container — pre-built (Docker Hub, multi-arch linux/amd64 + arm64):**"
            echo '```bash'
            echo "docker pull kuestenlogik/surgewave-broker:${V}"
            echo "docker pull kuestenlogik/surgewave-control:${V}"
            echo "# …oder :latest"
            echo '```'
            echo ""
            echo "**Container — alternative registry (GHCR):**"
            echo '```bash'
            echo "docker pull ghcr.io/kuestenlogik/surgewave-broker:${V}"
            echo "docker pull ghcr.io/kuestenlogik/surgewave-control:${V}"
            echo '```'
            echo ""
            echo "**Container — build from source:**"
            echo '```bash'
            echo "dotnet publish src/Kuestenlogik.Surgewave.Broker -c Release /t:PublishContainer"
            echo "dotnet publish src/Kuestenlogik.Surgewave.Control -c Release /t:PublishContainer"
            echo '```'
            echo ""
            echo "**Windows MSI (silent install):**"
            echo '```powershell'
            echo "msiexec /i surgewave-${V}-win-x64.msi /qn"
            echo '```'
            echo ""
            echo "**Linux:**"
            echo '```bash'
            echo "sudo bash install.sh"
            echo '```'
            echo ""
            echo "**Helm:**"
            echo '```bash'
            echo "helm install surgewave deploy/helm/surgewave/ --set broker.image.tag=${V}"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "---"
            echo ""
            echo "_The full commit list, contributors, and compare-URL diff are auto-generated below._"
            echo ""
          } > release-body.md
          echo "----- release-body.md -----"
          cat release-body.md
          echo "----- end -----"

      # Release-Titel-Theme aus dem passenden Milestone-Titel
      # (`vX.Y[.Z] — <theme>`-Konvention) — der GitHub-Release-Titel
      # liest sich dann `v0.4.0 — Production hardening & trustworthy admin`.
      - name: Resolve release title from milestone
        id: title
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BASE=$(echo "$VERSION" | sed -E 's/-.*$//')
          MAJ_MIN=$(echo "$BASE" | cut -d. -f1-2)
          MS_TITLES=$(gh api "repos/${{ github.repository }}/milestones?state=all&per_page=100" \
            --jq '.[].title' 2>/dev/null)
          THEME=""
          for candidate in "v${BASE}" "v${MAJ_MIN}"; do
            FULL=$(echo "$MS_TITLES" | grep -E "^${candidate}([[:space:]]+[—-][[:space:]]+.+)?$" | head -n 1 || true)
            if [[ -n "$FULL" ]]; then
              CANDIDATE_THEME=$(echo "$FULL" | sed -E "s/^${candidate}[[:space:]]+[—-][[:space:]]+//; t; d")
              if [[ -n "$CANDIDATE_THEME" ]]; then
                THEME="$CANDIDATE_THEME"
                echo "Resolved theme from milestone '${FULL}': ${THEME}"
                break
              fi
            fi
          done
          if [[ -n "$THEME" ]]; then
            echo "title=${TAG} — ${THEME}" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No theme found on milestone matching v${BASE} or v${MAJ_MIN} — release title will be bare ${TAG}."
            echo "title=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.title.outputs.title }}
          body_path: release-body.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-rc') }}
          files: |
            artifacts/packages/*.nupkg
            publish/*.tar.gz
            publish/*.zip
            publish/*.msi
            publish/*.deb
            publish/*.rpm
