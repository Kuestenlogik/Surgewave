# Pushes a refreshed surgewave.rb to the kuestenlogik/homebrew-surgewave
# tap repository whenever a GitHub release is published.
#
# Pipeline:
#   1. Trigger on release.published (after release.yml has uploaded
#      the per-platform CLI tarballs).
#   2. Compute SHA256 for every target archive (macOS x64/arm64 and
#      Linux x64/arm64).
#   3. Render packaging/macos/Formula/surgewave.rb by substituting the
#      version + four SHA256s.
#   4. Commit the rendered formula straight into the tap repo on a
#      release-tagged branch and push it to main.
#
# One-time setup before the first release:
#   - Create the tap repo: github.com/kuestenlogik/homebrew-surgewave
#     (must follow the `homebrew-<tap>` naming so `brew tap` resolves
#     kuestenlogik/surgewave → that repo).
#   - Drop a stub README.md + an empty Formula/ directory into it.
#   - Create a fine-grained PAT with `Contents: Read & Write` on
#     kuestenlogik/homebrew-surgewave only. Save as repo secret
#     HOMEBREW_TAP_TOKEN.
#
# Without the secret the workflow exits without failing the release —
# the tarballs are still attached to the GitHub release, users just
# don't get the brew channel until the secret is set.

name: homebrew

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to submit (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: read

# Lifted to workflow-level so step-level `if:` conditions can reference
# `env.HOMEBREW_TAP_TOKEN`. GitHub Actions disallows the `secrets`
# context inside step-level `if:` expressions; assigning the secret to
# env once here is the documented workaround.
env:
  HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

jobs:
  publish:
    name: Push formula to tap
    runs-on: ubuntu-latest

    # Skip RC / beta / preview tags — brew users expect stable.
    if: ${{ github.event_name != 'release' || (!contains(github.event.release.tag_name, '-rc') && !contains(github.event.release.tag_name, '-beta') && !contains(github.event.release.tag_name, '-preview')) }}

    steps:
      - name: Bail out if HOMEBREW_TAP_TOKEN is missing
        if: ${{ env.HOMEBREW_TAP_TOKEN == '' }}
        run: |
          echo "::warning::HOMEBREW_TAP_TOKEN secret is not set — skipping Homebrew formula update."
          echo "Add a fine-grained PAT with push access to kuestenlogik/homebrew-surgewave as HOMEBREW_TAP_TOKEN to enable this step."

      - name: Stop here if no token
        if: ${{ env.HOMEBREW_TAP_TOKEN == '' }}
        run: exit 0

      - uses: actions/checkout@v7

      - name: Resolve version
        id: meta
        run: |
          # Strip leading 'v' from the tag so the formula's `version`
          # field reads as a plain SemVer string.
          version="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          version="${version#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "version=$version"

      - name: Download CLI tarballs from the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          tag="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          gh release download "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern 'surgewave-cli-osx-*.tar.gz' \
              --pattern 'surgewave-cli-linux-*.tar.gz' \
              --dir artifacts
          ls -la artifacts

      - name: Compute SHA256 hashes
        id: hash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          # `shasum -a 256` is the cross-platform name; `sha256sum`
          # also works on the ubuntu runner. We strip the trailing
          # space + filename so each hash sits as a clean hex string.
          mac_arm=$(shasum -a 256 "artifacts/surgewave-cli-osx-arm64-${VERSION}.tar.gz"   | cut -d' ' -f1)
          mac_x64=$(shasum -a 256 "artifacts/surgewave-cli-osx-x64-${VERSION}.tar.gz"     | cut -d' ' -f1)
          lnx_arm=$(shasum -a 256 "artifacts/surgewave-cli-linux-arm64-${VERSION}.tar.gz" | cut -d' ' -f1)
          lnx_x64=$(shasum -a 256 "artifacts/surgewave-cli-linux-x64-${VERSION}.tar.gz"   | cut -d' ' -f1)
          echo "macos_arm64=$mac_arm" >> "$GITHUB_OUTPUT"
          echo "macos_x64=$mac_x64"   >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$lnx_arm" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$lnx_x64"   >> "$GITHUB_OUTPUT"

      - name: Render formula from template
        env:
          VERSION:           ${{ steps.meta.outputs.version }}
          SHA_MACOS_ARM64:   ${{ steps.hash.outputs.macos_arm64 }}
          SHA_MACOS_X64:     ${{ steps.hash.outputs.macos_x64 }}
          SHA_LINUX_ARM64:   ${{ steps.hash.outputs.linux_arm64 }}
          SHA_LINUX_X64:     ${{ steps.hash.outputs.linux_x64 }}
        run: |
          mkdir -p out/Formula
          # `|` separator in sed expressions because the SHA256 is
          # always hex (no slashes to clash with).
          sed \
              -e "s|__VERSION__|${VERSION}|g" \
              -e "s|__SHA256_MACOS_ARM64__|${SHA_MACOS_ARM64}|g" \
              -e "s|__SHA256_MACOS_X64__|${SHA_MACOS_X64}|g" \
              -e "s|__SHA256_LINUX_ARM64__|${SHA_LINUX_ARM64}|g" \
              -e "s|__SHA256_LINUX_X64__|${SHA_LINUX_X64}|g" \
              packaging/macos/Formula/surgewave.rb > out/Formula/surgewave.rb

          echo "Rendered formula:"
          cat out/Formula/surgewave.rb

      - name: Push to homebrew-surgewave tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION:  ${{ steps.meta.outputs.version }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/kuestenlogik/homebrew-surgewave.git" tap

          # Drop the freshly-rendered formula in. Homebrew looks at
          # the Formula/ subdirectory of a tap repo; the file name
          # must equal the formula class name in lowercase.
          mkdir -p tap/Formula
          cp out/Formula/surgewave.rb tap/Formula/surgewave.rb

          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # No-op guard — if the formula is byte-identical (e.g. a
          # release was re-published without rebuilding the binaries),
          # avoid emitting an empty commit.
          if git diff --quiet; then
              echo "Formula unchanged — nothing to commit."
              exit 0
          fi

          git add Formula/surgewave.rb
          git commit -m "surgewave ${VERSION}" \
                     -m "Auto-generated by Kuestenlogik/Surgewave release workflow." \
                     -m "Sources the per-platform tarballs from the v${VERSION} GitHub release."
          git push origin HEAD:main
