name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "VERSION=0.1.0-ci.${COMMIT_COUNT}.${SHORT_SHA}" >> $GITHUB_ENV
          fi

      - name: Restore
        run: dotnet restore Kuestenlogik.Surgewave.slnx --configfile nuget.config

      - name: Build
        run: dotnet build Kuestenlogik.Surgewave.slnx -c Release --no-restore -p:Version=$VERSION -p:SourceRevisionId=$(git rev-parse HEAD)

      - name: Test
        # -m:1 = MSBuild seriellisiert die test-Assemblies. Sonst werden
        # IntegrationTests, Connect.Eos, Runtime.Tests, Broker.Tests usw.
        # gleichzeitig hochgezogen, jeder mit eigenen in-process broker(n),
        # und der GitHub-Actions Linux-Runner geht in Port-/Process-
        # Exhaustion (Hang ohne klaren Fehler). Lokal Windows hat mehr
        # Reserve und schluckt das. -m:1 verlangsamt den Lauf, ist aber
        # die einzige robuste Variante, weil xunit-Collections nur
        # innerhalb eines Assemblies serialisieren koennen.
        run: dotnet test Kuestenlogik.Surgewave.slnx -c Release --no-build -v normal --settings coverlet.runsettings -m:1

      - name: Pack
        run: dotnet pack Kuestenlogik.Surgewave.slnx -c Release --no-build -o artifacts/packages -p:Version=$VERSION

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg

      # Push to GitHub Packages on every push (pre-release on main, stable on tags)
      - name: Publish to GitHub Packages
        if: github.event_name == 'push'
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source "https://nuget.pkg.github.com/Kuestenlogik/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
