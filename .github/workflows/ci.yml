name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
            SHORT_SHA=$(git rev-parse --short HEAD)
            # Prefix the sha with 'g' (git-describe convention). An all-numeric short sha with a
            # leading zero (e.g. 0558208) is an INVALID SemVer 2.0 pre-release identifier, which makes
            # `dotnet pack` fail with "PackageVersion string ... is invalid"; the letter forces an
            # alphanumeric identifier, where leading zeros are allowed.
            echo "VERSION=0.1.0-ci.${COMMIT_COUNT}.g${SHORT_SHA}" >> $GITHUB_ENV
          fi

      - name: Restore
        run: dotnet restore Kuestenlogik.Surgewave.slnx --configfile nuget.config

      - name: Build
        run: dotnet build Kuestenlogik.Surgewave.slnx -c Release --no-restore -p:Version=$VERSION -p:SourceRevisionId=$(git rev-parse HEAD)

      - name: Test
        # -m:1 = MSBuild seriellisiert die test-Assemblies (sonst
        # Port-/Process-Exhaustion auf dem Linux-Runner durch parallel
        # hochgezogene in-process broker).
        #
        # --blame-hang-timeout / --blame-hang-dump-type: wenn ein Test
        # 5 min keinen Output produziert, dumpt xUnit einen Full-Memory-
        # Dump und beendet den Test-Host. Damit failt CI fail-fast statt
        # bis zum 6h Workflow-Timeout zu blockieren — und der Dump
        # landet als Artefakt fuer Thread-Trace-Analyse.
        run: dotnet test Kuestenlogik.Surgewave.slnx -c Release --no-build -v normal --settings coverlet.runsettings -m:1 --blame-hang-timeout 300s --blame-hang-dump-type full

      - name: Upload hang dumps
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hang-dumps-${{ github.run_id }}
          path: |
            **/TestResults/**/*.dmp
            **/TestResults/**/Sequence*
          if-no-files-found: ignore
          retention-days: 7

      - name: Pack
        run: dotnet pack Kuestenlogik.Surgewave.slnx -c Release --no-build -o artifacts/packages -p:Version=$VERSION

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg

      # Push to GitHub Packages on every push (pre-release on main, stable on tags)
      - name: Publish to GitHub Packages
        if: github.event_name == 'push'
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source "https://nuget.pkg.github.com/Kuestenlogik/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
